# Starship Prompt Configuration ‚ÄĒ Pure style + Tokyo Night
# https://starship.rs/presets/pure-preset

palette = "tokyo-night"
add_newline = true

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$python\
$character"""

[directory]
style = "blue"
truncate_to_repo = true

[character]
success_symbol = "[‚ĚĮ](mauve)"
error_symbol = "[‚ĚĮ](red)"
vimcmd_symbol = "[‚Ěģ](green)"

[git_branch]
format = "[$branch]($style)"
style = "overlay0"
truncation_length = 24
truncation_symbol = "‚Ä¶"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](pink) ($ahead_behind$stashed)]($style)"
style = "teal"
conflicted = "‚Äč"
untracked = "‚Äč"
modified = "‚Äč"
staged = "‚Äč"
renamed = "‚Äč"
deleted = "‚Äč"
stashed = "‚Č°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "overlay0"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
min_time = 500

[python]
format = "[$virtualenv]($style) "
style = "overlay0"

[palettes.tokyo-night]
blue = "#7aa2f7"
mauve = "#bb9af7"
red = "#f7768e"
green = "#9ece6a"
pink = "#ff9e64"
teal = "#2ac3de"
yellow = "#e0af68"
overlay0 = "#565f89"
